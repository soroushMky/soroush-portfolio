<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Clinician workflow diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#ffffff"/>

  <!-- legend -->
  <rect x="40" y="20" width="14" height="14" rx="3" fill="#EAF2FF" stroke="#4C8DFF"/>
  <text x="60" y="31" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#374151">Main flow, per visit</text>
  <rect x="220" y="20" width="14" height="14" rx="3" fill="#F3F4F6" stroke="#9CA3AF"/>
  <text x="240" y="31" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#374151">Parallel utility</text>

  <!-- row 1 -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="40" y="60" width="170" height="50" rx="10" fill="#EAF2FF" stroke="#4C8DFF" stroke-width="1.2"/>
    <text x="125" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">Draft Review</text>

    <line x1="210" y1="85" x2="250" y2="85" stroke="#6B7280" stroke-width="1.6" marker-end="url(#arrow)"/>

    <rect x="250" y="60" width="170" height="50" rx="10" fill="#EAF2FF" stroke="#4C8DFF" stroke-width="1.2"/>
    <text x="335" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">Sign-off</text>

    <line x1="420" y1="85" x2="460" y2="85" stroke="#6B7280" stroke-width="1.6" marker-end="url(#arrow)"/>

    <rect x="460" y="60" width="170" height="50" rx="10" fill="#EAF2FF" stroke="#4C8DFF" stroke-width="1.2"/>
    <text x="545" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">Note Filed</text>

    <!-- connector down to row 2 -->
    <path d="M545 110 L545 150 L125 150 L125 190" fill="none" stroke="#6B7280" stroke-width="1.6" marker-end="url(#arrow)"/>

    <!-- row 2 -->
    <rect x="40" y="190" width="170" height="50" rx="10" fill="#EAF2FF" stroke="#4C8DFF" stroke-width="1.2"/>
    <text x="125" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">Patient Profile</text>

    <text x="125" y="260" text-anchor="middle" font-size="12" fill="#6B7280">↻ loops back to Draft Review for the next visit</text>

    <!-- parallel utility -->
    <circle cx="335" cy="240" r="2.5" fill="#6B7280"/>
    <line x1="335" y1="240" x2="335" y2="290" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="4 4"/>

    <rect x="250" y="290" width="170" height="60" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.2"/>
    <text x="335" y="316" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">Scheduling</text>
    <text x="335" y="334" text-anchor="middle" font-size="11" fill="#6B7280">Book / cancel / reschedule</text>
    <text x="510" y="320" font-size="11" fill="#9CA3AF">Not tied to a single visit —</text>
    <text x="510" y="335" font-size="11" fill="#9CA3AF">accessible anytime</text>
  </g>
</svg>
