<div style="display:flex; flex-wrap:wrap; gap:16px; margin-bottom:8px; font-size:12px; color:var(--color-text-secondary);">
<span style="display:flex; align-items:center; gap:4px;"><span style="width:10px; height:10px; border-radius:2px; background:#378ADD;"></span>Ease of use</span>
<span style="display:flex; align-items:center; gap:4px;"><span style="width:10px; height:10px; border-radius:2px; background:#D85A30;"></span>Payment clarity</span>
</div>
<div style="position: relative; width: 100%; height: 260px;">
<canvas id="testScoresChart" role="img" aria-label="Bar chart comparing ease of use and payment clarity scores across two usability test tasks. Task 1, booking a machine: ease of use 4.5 out of 5, payment clarity 3.5 out of 5. Task 2, gamification: ease of use 5 out of 5, payment clarity not applicable.">Task 1 booking: ease of use 4.5, payment clarity 3.5. Task 2 gamification: ease of use 5.0.</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('testScoresChart'), {
  type: 'bar',
  data: {
    labels: ['Task 1 — book a machine', 'Task 2 — gamification'],
    datasets: [
      { label: 'Ease of use', data: [4.5, 5.0], backgroundColor: '#378ADD' },
      { label: 'Payment clarity', data: [3.5, null], backgroundColor: '#D85A30' }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { y: { min: 0, max: 5, ticks: { stepSize: 1 } } }
  }
});
</script>
